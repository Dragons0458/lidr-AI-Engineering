[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
output_encoding = utf-8

# Live ``sqlalchemy.url`` comes from app.config.get_settings().DATABASE_URL.
# A placeholder is kept here for the (rare) case of running ``alembic`` outside
# of the FastAPI process — env.py reads from Settings, not from this value.
sqlalchemy.url = postgresql+psycopg://estimator:estimator@localhost:5433/estimator

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
